        .loading-overlay {

<body>

    <script>
        let episodes = [];
        let currentEpisodeIndex = -1;
        let preloadedEpisodeData = null;
        let hls = null;
        let preloadHls = null;
        let downloadingEpisodes = new Set();
        let preloadingInProgress = false;

        const buildIdInput = document.getElementById('buildId');
        const originalPathInput = document.getElementById('originalPath');
        const serverUrlInput = document.getElementById('serverUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const cleanupBtn = document.getElementById('cleanupBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const errorDiv = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const episodesPanel = document.getElementById('episodesPanel');
        const episodesGrid = document.getElementById('episodesGrid');
        const episodeCount = document.getElementById('episodeCount');
        const videoPlayer = document.getElementById('videoPlayer');
        const preloadPlayer = document.getElementById('preloadPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const placeholder = document.getElementById('placeholder');
        const videoInfo = document.getElementById('videoInfo');
        const videoLikes = document.getElementById('videoLikes');
        const videoTitle = document.getElementById('videoTitle');
        const videoNumber = document.getElementById('videoNumber');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const downloadStatus = document.getElementById('downloadStatus');
        let isFullscreen = false;
        let videouid = '';

        function buildM3U8Url(id) {
            const idStr = id.toString();
            return `https://hwzthls.dramaboxdb.com/${idStr.slice(-2).split('').reverse().join('')}/${videouid}/${id}_2/m3u8/${id}.720p.m3u8`;
        }

        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            errorDiv.classList.remove('show');
        }

        function showDownloadStatus(message) {
            downloadStatus.textContent += message + '\n';
            downloadStatus.classList.add('show');
            downloadStatus.scrollTop = downloadStatus.scrollHeight;
        }

        function hideDownloadStatus() {
            downloadStatus.classList.remove('show');
            downloadStatus.textContent = '';
        }

        function setLoading(isLoading) {
            fetchBtn.disabled = isLoading;
            if (isLoading) {
                spinner.classList.add('show');
                btnText.textContent = 'Loading...';
            } else {
                spinner.classList.remove('show');
                btnText.textContent = '▶️ Fetch Episodes';
            }
        }


        // function setCleanupLoading(isLoading) {
        //     cleanupBtn.disabled = isLoading;
        //     if (isLoading) {
        //         cleanupBtn.querySelector('.spinner').classList.add('show');
        //         cleanupBtn.querySelector('span').textContent = 'Cleaning...';
        //     } else {
        //         cleanupBtn.querySelector('.spinner').classList.remove('show');
        //         cleanupBtn.querySelector('span').textContent = '🧹 Cleanup Server Files';
        //     }
        // }

        cleanupBtn.addEventListener('click', async () => {
            
            // setCleanupLoading(true);
           const res = await  fetch('/cleanup', {
                method: 'GET'
            });
            const json =await res.json();
            cleanupBtn.textContent = `🧹 Cleanup Completed | [${json.message}]` ;
        });

        function getMovieSlug() {
            let originalPath = "";
            if(originalPathInput.value.includes("https://www.dramaboxdb.com/")){
                const url = new URL(originalPathInput.value);
                originalPath = url.pathname.slice(1);
            } else {
                originalPath = originalPathInput.value;
            }
            const parts = originalPath.split('/');
            return parts[parts.length - 1];
        }

        function getmovieID() {
            let originalPath = "";
            if(originalPathInput.value.includes("https://www.dramaboxdb.com/")){
                const url = new URL(originalPathInput.value);
                originalPath = url.pathname.slice(1);
            } else {
                originalPath = originalPathInput.value;
            }
            const parts = originalPath.split('/');
            return parts[parts.length - 2];
        }

        function getEpisodeUrl(episode) {
            const buildId = buildIdInput.value;
            const movieSlug = getMovieSlug();
            const movieId = getmovieID();
            return `https://www.dramaboxdb.com/_next/data/${buildId}/en/ep/${movieId}_${movieSlug}/${episode.id}_Episode-${episode.index + 1}.json`;
        }

        function updateEpisodeCards() {
            document.querySelectorAll('.episode-card').forEach((card, index) => {
                card.classList.remove('playing', 'preloading', 'downloading');
                const statusDiv = card.querySelector('.episode-status');
                statusDiv.innerHTML = '▶️';
                
                if (index === currentEpisodeIndex) {
                    card.classList.add('playing');
                    statusDiv.innerHTML = '<span class="badge playing">PLAYING</span>';
                } else if (downloadingEpisodes.has(index)) {
                    card.classList.add('downloading');
                    statusDiv.innerHTML = '<span class="badge downloading">DOWNLOADING</span>';
                } else if (preloadedEpisodeData && index === preloadedEpisodeData.index) {
                    card.classList.add('preloading');
                    statusDiv.innerHTML = '<span class="badge preloading">READY</span>';
                }
            });
        }



        
        function createEpisodeCard(episode, index) {
            const card = document.createElement('div');
            card.className = 'episode-card';
            card.dataset.index = index;
            
            card.innerHTML = `
                <div class="episode-header">
                    <span class="episode-number">Episode ${episode.indexStr}</span>
                    <div class="episode-status">▶️</div>
                </div>
                <div class="episode-details">
                    <span>❤️ ${episode?.like_count || 0}</span>
                    <span>ID: ${episode.indexStr}</span>
                </div>
            `;
            
            card.addEventListener('click', () => playEpisode(index));
            
            return card;
        }

        const findVideoUrl = (data, index) => {
            if (data.pageProps?.chapterList[index]?.m3u8Url) {
               if(videouid == ''){
                    console.log("Setting videouid");
                   videouid = data.pageProps.chapterList[index].m3u8Url.split('/').slice(4,-3).join('/');
                console.log("videouid set to:", videouid);
            }
             return data.pageProps.chapterList[index].m3u8Url;
            }
            return null;
        };

        async function downloadAndConvertTS(episode, isPreload = false) {
            const serverUrl = serverUrlInput.value;
            const episodeId = episode.id;
            const episodeIndex = episodes.indexOf(episode);
            
            downloadingEpisodes.add(episodeIndex);
            updateEpisodeCards();
            
            const baseUrl = buildM3U8Url(episodeId).replace('.m3u8', '-{num}.ts');
            console.log('Base TS URL:', baseUrl);
            
            if (!isPreload) {
                showDownloadStatus(`Starting download for Episode ${episode.indexStr}...`);
                loadingText.textContent = `Downloading Episode ${episode.indexStr}...`;
            } else {
                console.log(`Preloading Episode ${episode.indexStr} in background...`);
            }
            
            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `baseUrl=${encodeURIComponent(baseUrl)}&episodeId=${episodeId}`
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let done = false;

                while(!done) {
                    const { value, done: doneReading } = await reader.read();
                    done = doneReading;
                    if(value) {
                        const text = decoder.decode(value);
                        if (!isPreload) {
                            showDownloadStatus(text);
                        }
                    }
                }

                downloadingEpisodes.delete(episodeIndex);
                updateEpisodeCards();
                
                const videoUrl = `${serverUrl}/output_video?episodeId=${episodeId}`;
                console.log(`Episode ${episode.indexStr} downloaded successfully`);
                return videoUrl;
            } catch (err) {
                downloadingEpisodes.delete(episodeIndex);
                updateEpisodeCards();
                throw new Error(`Download failed: ${err.message}`);
            }
        }

        async function preloadNextEpisode() {
            if (preloadingInProgress) {
                console.log('Preload already in progress, skipping...');
                return;
            }
            
            const nextIndex = currentEpisodeIndex + 1;
            if (nextIndex >= episodes.length) return;

            preloadingInProgress = true;
            
            try {
                const nextEpisode = episodes[nextIndex];
                const episodeUrl = getEpisodeUrl(nextEpisode);
                const response = await fetch(episodeUrl);
                const data = await response.json();
                
                const videoUrl = findVideoUrl(data, nextIndex);
                
                if (!videoUrl) {
                    console.log(`No m3u8Url for Episode ${nextEpisode.indexStr}, downloading from server...`);
                    
                    const downloadedUrl = await downloadAndConvertTS(nextEpisode, true);
                    
                    preloadedEpisodeData = { 
                        index: nextIndex, 
                        videoUrl: downloadedUrl,
                        data: data,
                        isLocalFile: true
                    };
                    
                    updateEpisodeCards();
                    console.log(`Preloaded Episode ${nextEpisode.indexStr} from local server`);
                } else {
                    if (Hls.isSupported()) {
                        if (preloadHls) {
                            preloadHls.destroy();
                            preloadHls = null;
                        }
                        
                        preloadHls = new Hls({
                            maxBufferLength: 10,
                            maxMaxBufferLength: 20,
                            enableWorker: true,
                        });
                        
                        preloadHls.loadSource(videoUrl);
                        preloadHls.attachMedia(preloadPlayer);
                        
                        preloadedEpisodeData = { 
                            index: nextIndex, 
                            videoUrl: videoUrl,
                            data: data,
                            isLocalFile: false
                        };
                        
                        updateEpisodeCards();
                        console.log(`Preloaded Episode ${nextEpisode.indexStr} via HLS`);
                    }
                }
            } catch (err) {
                console.error('Failed to preload next episode:', err);
            } finally {
                preloadingInProgress = false;
            }
        }

        async function playEpisode(index) {
            if (index < 0 || index >= episodes.length) return;
            
            currentEpisodeIndex = index;
            const episode = episodes[index];
            
            document.querySelectorAll('.episode-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`[data-index="${index}"]`).classList.add('selected');
            
            loadingOverlay.classList.add('show');
            loadingText.textContent = 'Loading episode...';
            placeholder.style.display = 'none';
            if (!preloadedEpisodeData || preloadedEpisodeData.index !== index) {
                hideDownloadStatus();
            }
            
            try {
                let videoUrl, episodeData, isLocalFile = false;
                
                if (preloadedEpisodeData && preloadedEpisodeData.index === index) {
                    videoUrl = preloadedEpisodeData.videoUrl;
                    episodeData = preloadedEpisodeData.data;
                    isLocalFile = preloadedEpisodeData.isLocalFile;
                    
                    if (!isLocalFile) {
                        if (hls) {
                            hls.destroy();
                            hls = null;
                        }
                        
                        hls = preloadHls;
                        preloadHls = null;
                        
                        hls.detachMedia();
                        hls.attachMedia(videoPlayer);
                    } else {
                        if (hls) {
                            hls.destroy();
                            hls = null;
                        }
                        videoPlayer.src = videoUrl;
                        await videoPlayer.load();
                    }
                    
                    preloadedEpisodeData = null;
                } else {
                    const episodeUrl = getEpisodeUrl(episode);
                    const response = await fetch(episodeUrl);
                    episodeData = await response.json();

                    videoUrl = findVideoUrl(episodeData, index);
                    
                    if (!videoUrl) {
                        console.log('No m3u8Url found, initiating download...');
                        videoUrl = await downloadAndConvertTS(episode, false);
                        isLocalFile = true;
                        
                        if (hls) {
                            hls.destroy();
                            hls = null;
                        }
                        videoPlayer.src = videoUrl;
                        await videoPlayer.load();
                    } else {
                        if (hls) {
                            hls.destroy();
                            hls = null;
                        }
                        
                        if (Hls.isSupported()) {
                            hls = new Hls({
                                maxBufferLength: 30,
                                maxMaxBufferLength: 60,
                                enableWorker: true,
                                lowLatencyMode: false,
                            });
                            hls.loadSource(videoUrl);
                            hls.attachMedia(videoPlayer);
                            
                            await new Promise((resolve, reject) => {
                                hls.on(Hls.Events.MANIFEST_PARSED, resolve);
                                hls.on(Hls.Events.ERROR, (event, data) => {
                                    if (data.fatal) reject(data);
                                });
                            });
                        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                            videoPlayer.src = videoUrl;
                            await videoPlayer.load();
                        }
                    }
                }
                
                videoPlayer.style.display = 'block';
                videoInfo.style.display = 'block';
                fullscreenBtn.classList.add('show');
                videoTitle.textContent = episodeData.pageProps?.bookinfo?.bookname || `Episode ${episode.indexStr}`;
                videoLikes.textContent = `❤️ ${episode?.like_count || 0} likes`;
                videoNumber.textContent = `Episode ${episode.indexStr} of ${episodes.length}`;
                
                try {
                    await videoPlayer.play();
                } catch (playErr) {
                    console.log('Autoplay prevented, waiting for user interaction');
                }
                
                loadingOverlay.classList.remove('show');
                
                updateEpisodeCards();
                
                setTimeout(() => preloadNextEpisode(), 3000);
                
            } catch (err) {
                console.error('Failed to play episode:', err);
                loadingOverlay.classList.remove('show');
                showError('Failed to load video: ' + err.message);
            }
        }

        videoPlayer.addEventListener('ended', () => {
            const nextIndex = currentEpisodeIndex + 1;
            if (nextIndex < episodes.length) {
                setTimeout(() => {
                    playEpisode(nextIndex);
                    const nextCard = document.querySelector(`[data-index="${nextIndex}"]`);
                    if (nextCard) {
                        nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 500);
            }
        });

        function displayEpisodes() {
            episodesGrid.innerHTML = '';
            episodeCount.textContent = episodes.length;
            
            episodes.forEach((episode, index) => {
                const card = createEpisodeCard(episode, index);
                episodesGrid.appendChild(card);
            });
            
            episodesPanel.classList.add('show');
        }

        async function fetchEpisodes() {
            setLoading(true);
            hideError();
            hideDownloadStatus();
            episodes = [];
            currentEpisodeIndex = -1;
            preloadedEpisodeData = null;
            downloadingEpisodes.clear();
            episodesPanel.classList.remove('show');
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            if (preloadHls) {
                preloadHls.destroy();
                preloadHls = null;
            }
            videoPlayer.style.display = 'none';
            videoInfo.style.display = 'none';
            fullscreenBtn.classList.remove('show');
            placeholder.style.display = 'block';

            try {
                const buildId = buildIdInput.value;
                let originalPath = "";
                if(originalPathInput.value.includes("https://www.dramaboxdb.com/")){
                    const url = new URL(originalPathInput.value);
                    originalPath = url.pathname.slice(1);
                } else {
                    originalPath = originalPathInput.value;
                }
                
                const jsonUrl = `https://www.dramaboxdb.com/_next/data/${buildId}/en/${originalPath}.json`;
                
                const response = await fetch(jsonUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                let episodeList = null;
                
                if (data.pageProps?.data?.online_base) {
                    episodeList = data.pageProps.data.online_base;
                } else if (data.pageProps?.chapterList) {
                    episodeList = data.pageProps.chapterList;
                } else if (data.pageProps?.detail?.episodeList) {
                    episodeList = data.pageProps.detail.episodeList;
                } else if (Array.isArray(data)) {
                    episodeList = data;
                }

                if (!episodeList || !Array.isArray(episodeList)) {
                    throw new Error('Could not find episode list in JSON response');
                }

                episodes = episodeList;
                console.log(`Fetched ${episodes.length} episodes`);
                displayEpisodes();
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }

        fetchBtn.addEventListener('click', fetchEpisodes);
        
        buildIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchEpisodes();
        });
        
        originalPathInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchEpisodes();
        });

        function toggleFullscreen() {
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                videoContainer.classList.add('fullscreen');
                fullscreenBtn.textContent = 'F - Exit Fullscreen';
            } else {
                videoContainer.classList.remove('fullscreen');
                fullscreenBtn.textContent = 'F - Fullscreen';
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') {
                if (videoPlayer.style.display === 'block') {
                    e.preventDefault();
                    toggleFullscreen();
                }
            }
            if (e.key === 'Escape' && isFullscreen) {
                toggleFullscreen();
            }
        });


       function formatBytes(bytes) {
    if (bytes === 0) return "0 Bytes";

    const sizes = ["Bytes", "KB", "MB", "GB", "TB"];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));

    const value = bytes / Math.pow(1024, i);

    return value.toFixed(2) + " " + sizes[i];
}
       async function  get_status(){
            const res = await fetch('/folder-size')
            const json = await res.json();
            console.log('Folder size response:', json);
            const size = formatBytes(json.size);
            cleanupBtn.textContent = `🧹 Cleanup Server Files | [${size}]`
        }
         setInterval(get_status,2000);
        
    </script>
